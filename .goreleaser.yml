version: 2
project_name: launcher

before:
  hooks:
    - go mod tidy

builds:
  - id: kurel
    main: ./cmd/kurel
    binary: kurel
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/go-kure/launcher/pkg/cmd/shared.Version={{.Version}}
      - -X github.com/go-kure/launcher/pkg/cmd/shared.GitCommit={{.ShortCommit}}
      - -X github.com/go-kure/launcher/pkg/cmd/shared.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: kurel-archive
    ids: [kurel]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "kurel_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Generate Software Bill of Materials for supply chain security
sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"

# Sign checksums with cosign (v3 bundle format) for artifact verification
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

release:
  github:
    owner: go-kure
    name: launcher
  draft: false
  prerelease: auto

# Disable built-in changelog - we use git-cliff for CHANGELOG.md
changelog:
  disable: true
