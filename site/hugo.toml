baseURL = 'https://www.gokure.dev/launcher/'
languageCode = 'en-us'
title = 'Go Kure — Launcher'

[params]
  disableInlineCopyToClipBoard = true
  themeVariant = "relearn-dark"
  # Version is overridden at build time via versions.toml config overlay.
  # Default to "dev" so local builds and CI validation show the WIP banner.
  version = "dev"

[module]
  [[module.imports]]
    path = 'github.com/McShelby/hugo-theme-relearn'

  # === Generated content (from inject-frontmatter.sh, driven by docs-map.yaml) ===
  # Mounted wholesale: every file inject-frontmatter.sh writes into .generated/ is
  # published. The set is controlled entirely by docs-map.yaml — no per-file list.
  [[module.mounts]]
    source = ".generated"
    target = "content"

  # === Hand-authored content ===
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
