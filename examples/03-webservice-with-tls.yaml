apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: my-app
spec:
  components:
  - name: web
    type: webservice
    properties:
      image: myregistry/my-app:v1.2.3
      port: 8080
      replicas: 2
    traits:
    - type: expose
      properties:
        rules:
        - host: my-app.example.com
          paths:
          - path: /
            port: 8080
        tls:
        - secretName: my-app-tls
          hosts:
          - my-app.example.com
    - type: certificate
      properties:
        secretName: my-app-tls
        dnsNames:
        - my-app.example.com
