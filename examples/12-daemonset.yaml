apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: node-agent
spec:
  components:
  - name: agent
    type: daemonset
    properties:
      image: myregistry/node-agent:v1.0.0
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      volumes:
      - name: host-proc
        hostPath:
          path: /proc
      volumeMounts:
      - name: host-proc
        mountPath: /host/proc
        readOnly: true
