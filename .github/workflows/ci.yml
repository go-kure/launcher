name: CI

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main, develop]
  merge_group:  # required: checks must report on the merge queue's temporary branch
  schedule:
    - cron: '0 4 * * *'  # 4am UTC daily - catch external changes
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  # Go version is read from mise.toml (single source of truth)
  # GO_VERSION is set dynamically in each job that needs it
  GOLANGCI_LINT_VERSION: 'v2.10.1'
  # The runner binary patch (Runner.Worker.dll) renames all occurrences of
  # ACTIONS_RESULTS_URL to ACTIONS_RESULTS_ORL, including the name the Worker
  # injects into step process environments.  Workflow env overrides runner-injected
  # values, so setting ACTIONS_RESULTS_URL here ensures upload-artifact,
  # download-artifact, and cache (v2) all see the correct in-cluster URL.
  ACTIONS_RESULTS_URL: 'http://actions-cache-server.arc-runners.svc.cluster.local:3000/'

# Avoid duplicate runs on the same commit
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Pre-flight: Detect Changed Paths
  # =============================================================================

  changes:
    name: detect-changes
    runs-on: autops-kube-kure
    timeout-minutes: 2
    # On merge_group there is no PR base to diff against; dorny/paths-filter would
    # error. Skip the filter and force both outputs to 'true' so every gating job
    # runs in the queue — otherwise required checks never report and merges hang.
    outputs:
      go: ${{ github.event_name == 'merge_group' && 'true' || steps.filter.outputs.go }}
      docs: ${{ github.event_name == 'merge_group' && 'true' || steps.filter.outputs.docs }}

    steps:
    - uses: actions/checkout@v7
    - uses: dorny/paths-filter@v4
      if: github.event_name != 'merge_group'
      id: filter
      with:
        filters: |
          go:
            - '**.go'
            - 'go.mod'
            - 'go.sum'
            - 'Makefile'
            - '.github/workflows/**'
            - 'site/scripts/check-kure-dep-sync.sh'
            - 'site/scripts/kuredepsync/**'
          docs:
            - 'site/**'
            - 'docs/**'
            - '**.md'
            - 'pkg/**'
            - 'cmd/**'
            - 'scripts/**'
            - '.github/workflows/**'

  # =============================================================================
  # Stage 1: Fast Validation
  # =============================================================================

  validate:
    name: lint
    runs-on: autops-kube-kure
    timeout-minutes: 20
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.go == 'true')

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: command -v make &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends make)

    - name: Read Go version from mise.toml
      id: go-version
      run: |
        GO_VER=$(grep '^go = ' mise.toml | sed 's/go = "\(.*\)"/\1/')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    # Source-aware Go build cache (distinct job prefix so lint and test don't overwrite
    # each other's entry). See the test job for the design rationale.
    - name: Restore Go build cache
      id: gocache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-validate-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-${{ hashFiles('**/*.go', 'go.mod', 'go.sum', 'Makefile', '**/testdata/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-validate-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-validate-

    - name: Log Go build cache restore
      run: |
        echo "cache-hit=${{ steps.gocache.outputs.cache-hit }}"
        echo "primary-key=${{ steps.gocache.outputs.cache-primary-key }}"
        echo "matched-key=${{ steps.gocache.outputs.cache-matched-key }}"

    - name: Install dependencies
      run: make deps

    - name: Check Go version consistency
      run: make check-go-version

    - name: Install goimports
      run: go install golang.org/x/tools/cmd/goimports@latest

    - name: Check formatting
      run: |
        make fmt
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::Code is not properly formatted. Run 'make fmt' to fix."
          git diff
          exit 1
        fi

    - name: Check go mod tidy
      run: |
        make tidy
        if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
          echo "::error::go.mod or go.sum is not tidy. Run 'make tidy' to fix."
          git diff go.mod go.sum
          exit 1
        fi

    - name: Run go vet
      run: make vet

    - name: Check kuredepsync helper module
      run: |
        cd site/scripts/kuredepsync
        GOWORK=off go mod tidy
        if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
          echo "::error::kuredepsync go.mod/go.sum not tidy. Run 'go mod tidy' in site/scripts/kuredepsync."
          git diff go.mod go.sum
          exit 1
        fi
        GOWORK=off go vet ./...
        GOWORK=off go test ./...

    # Blocking on PR / merge-queue: fail only when the change newly leads imported kure
    # on a shared direct dep. The script fetches its own base ref.
    - name: Check launcher not newly ahead of imported kure
      if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
      env:
        BASE_REF: ${{ github.base_ref || 'main' }}
      run: bash site/scripts/check-kure-dep-sync.sh --base "origin/${BASE_REF}"

    # Visibility only on push / schedule (base merge-base can equal HEAD → no-op diff).
    - name: Report launcher-kure shared-dep lead
      if: github.event_name == 'push' || github.event_name == 'schedule'
      run: bash site/scripts/check-kure-dep-sync.sh --report

    - name: Fetch base branch for diff-based lint
      if: github.event_name == 'pull_request'
      run: git fetch origin ${{ github.base_ref }} --depth=1

    - name: Run linters
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          make lint LINT_FLAGS="--new-from-rev=origin/${{ github.base_ref }}"
        else
          make lint
        fi

    - name: Save Go build cache
      if: success() && steps.gocache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/go-build
        key: ${{ steps.gocache.outputs.cache-primary-key }}

  # =============================================================================
  # Stage 2: Tests and Security (parallel with lint)
  # =============================================================================

  test:
    name: test
    runs-on: autops-kube-kure
    timeout-minutes: 25
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.go == 'true')

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends build-essential

    - name: Read Go version from mise.toml
      id: go-version
      run: |
        GO_VER=$(grep '^go = ' mise.toml | sed 's/go = "\(.*\)"/\1/')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    # Source-aware Go build cache. Warmed on push-to-main (main-scoped, restorable by both
    # PR and merge_group runs); restore-keys fall back deps-first then job-prefix. Split
    # restore/save so we can log exact vs fallback via cache-matched-key.
    - name: Restore Go build cache
      id: gocache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-test-race-cover-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-${{ hashFiles('**/*.go', 'go.mod', 'go.sum', 'Makefile', '**/testdata/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-test-race-cover-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-test-race-cover-

    - name: Log Go build cache restore
      run: |
        echo "cache-hit=${{ steps.gocache.outputs.cache-hit }}"
        echo "primary-key=${{ steps.gocache.outputs.cache-primary-key }}"
        echo "matched-key=${{ steps.gocache.outputs.cache-matched-key }}"

    - name: Install dependencies
      run: make deps

    - name: Run tests
      run: |
        set -euo pipefail
        mkdir -p coverage
        go test -v -race -coverprofile=coverage/coverage.out -covermode=atomic -timeout 5m ./... 2>&1 | tee /tmp/gotest.log

    # Save only on non-exact restore (fallback/miss) and only if the run succeeded, so a
    # broken build never publishes a cache. Refreshes the per-tree entry for main-warming.
    - name: Save Go build cache
      if: success() && steps.gocache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/go-build
        key: ${{ steps.gocache.outputs.cache-primary-key }}

    - name: Upload test log
      uses: actions/upload-artifact@v7
      if: always()
      continue-on-error: true
      with:
        name: test-log
        path: /tmp/gotest.log
        if-no-files-found: warn

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v7
      continue-on-error: true
      with:
        name: coverage
        path: coverage/coverage.out
        retention-days: 7

  security:
    name: Security
    runs-on: autops-kube-kure
    timeout-minutes: 15
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.go == 'true')

    # GOMEMLIMIT keeps Go's GC under the runner pod memory limit so govulncheck doesn't get
    # OOMKilled on the in-cluster ARC runner. Pairs with the 6Gi ARC runner limit.
    env:
      GOMEMLIMIT: 5GiB

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: command -v make &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends make)

    - name: Read Go version from mise.toml
      id: go-version
      run: |
        GO_VER=$(grep '^go = ' mise.toml | sed 's/go = "\(.*\)"/\1/')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    # Source-aware Go build cache. govulncheck's symbol scan compiles the whole program,
    # so a warm build cache cuts this job materially (it had no caching before).
    - name: Restore Go build cache
      id: gocache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-security-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-${{ hashFiles('**/*.go', 'go.mod', 'go.sum', 'Makefile', '**/testdata/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-security-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-security-

    - name: Log Go build cache restore
      run: |
        echo "cache-hit=${{ steps.gocache.outputs.cache-hit }}"
        echo "primary-key=${{ steps.gocache.outputs.cache-primary-key }}"
        echo "matched-key=${{ steps.gocache.outputs.cache-matched-key }}"

    - name: Install scan tools
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
        command -v jq &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends jq)

    - name: Run govulncheck
      env:
        # Accepted-risk advisories: reachable under symbol scan but not exploitable in Launcher's use.
        # Every entry MUST carry a justification.
        # GO-2026-5377: privilege escalation in the external-secrets *controller* reconciler.
        #   Launcher only imports the apis module to generate CRD manifests; reachable traces run
        #   through generated deepcopy boilerplate and package registration/init paths, never a
        #   reconciler. No upstream fix in the Go vuln DB (Fixed in: N/A), and the apis module is
        #   untagged so no bump can clear it — see docs/github-workflows.md.
        VULN_ALLOWLIST: "GO-2026-5377"
      run: |
        set +e

        # Human-readable report for the log. This never gates the step (|| true): with a known
        # allowlisted finding govulncheck exits non-zero, and the JSON gate below is the sole
        # enforcement point.
        govulncheck -scan symbol ./... || true

        # Machine-readable scan for gating. In JSON mode govulncheck can exit 0 even with reachable
        # findings, so its exit code is deliberately ignored.
        govulncheck -scan symbol -format json ./... > govulncheck.json 2>govulncheck.err
        if [ ! -s govulncheck.json ]; then
          echo "::error::govulncheck produced no JSON output"
          cat govulncheck.err
          exit 1
        fi

        # OSV IDs with at least one reachable symbol trace (i.e. actually affecting our code).
        # Findings without a function-bearing frame are informational (required but not called).
        printf '%s\n' "$VULN_ALLOWLIST" | tr ' ' '\n' | sed '/^$/d' | sort -u > allowed.txt
        jq -r 'select(.finding? and any(.finding.trace[]?; .function != null)) | .finding.osv' \
          govulncheck.json | sort -u > reachable.txt

        # Split reachable advisories into accepted-risk vs must-fix buckets. grep exits 1 on
        # "no match"; guarded with || true so an empty bucket is not treated as an error.
        allowed_hit=$(grep -Fxf allowed.txt reachable.txt || true)
        unallowed=$(grep -Fxvf allowed.txt reachable.txt || true)

        {
          echo "## :shield: govulncheck (symbol scan)"
          echo ""
          if [ -n "$allowed_hit" ]; then
            echo "**Allowed reachable advisories (accepted risk):**"
            echo '```'
            echo "$allowed_hit"
            echo '```'
            echo ""
          fi
          if [ -n "$unallowed" ]; then
            echo "**Unallowed reachable advisories:**"
            echo '```'
            echo "$unallowed"
            echo '```'
            echo ""
            echo "**Fix:** update the Go version or affected dependencies, or add a justified entry to VULN_ALLOWLIST."
          fi
          if [ -z "$allowed_hit" ] && [ -z "$unallowed" ]; then
            echo ":white_check_mark: no reachable vulnerabilities"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        if [ -n "$unallowed" ]; then
          echo "Unallowed reachable vulnerabilities found:"
          echo "$unallowed"
          exit 1
        fi
        echo "No unallowed reachable vulnerabilities (allowed: ${allowed_hit:-none})."

    - name: Save Go build cache
      if: success() && steps.gocache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/go-build
        key: ${{ steps.gocache.outputs.cache-primary-key }}

    - name: Check for outdated dependencies
      run: make outdated

    - name: Check for sensitive files
      run: |
        # Check for common sensitive patterns
        if grep -r -i "password\|secret\|token\|key" --include="*.go" --include="*.yaml" --include="*.yml" . | grep -v "test" | grep -v "_test.go" | grep -E "(=|:)" | head -10; then
          echo "::warning::Potential sensitive information found in code. Please review."
        fi

  # =============================================================================
  # Stage 3: Coverage Check
  # =============================================================================

  coverage-check:
    name: Coverage Check
    runs-on: autops-kube-kure
    timeout-minutes: 5
    needs: test
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Read Go version from mise.toml
      id: go-version
      run: |
        GO_VER=$(grep '^go = ' mise.toml | sed 's/go = "\(.*\)"/\1/')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: false

    - name: Download coverage artifact
      id: download-coverage
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: coverage
        path: coverage/

    - name: Check coverage threshold
      id: coverage
      run: |
        if [ ! -f coverage/coverage.out ]; then
          echo "::warning::Coverage artifact not available (artifact upload may have failed on runner)"
          echo "coverage=0" >> $GITHUB_OUTPUT
          exit 0
        fi
        COVERAGE=$(go tool cover -func=coverage/coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
        THRESHOLD=80
        echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "Current coverage: ${COVERAGE}%"
        echo "Required threshold: ${THRESHOLD}%"

        if [ "${COVERAGE%.*}" -lt "$THRESHOLD" ]; then
          echo "::error::Test coverage ${COVERAGE}% is below required threshold of ${THRESHOLD}%"
          exit 1
        else
          echo "::notice::Test coverage ${COVERAGE}% meets required threshold"
        fi

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: ./coverage/coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        header: coverage
        message: |
          ## Test Coverage Report

          **Total Coverage:** ${{ steps.coverage.outputs.coverage }}%

          Coverage threshold: 80%

  # =============================================================================
  # Stage 4: Build (parallel with coverage-check)
  # =============================================================================

  build-binaries:
    name: Build kurel
    runs-on: autops-kube-kure
    timeout-minutes: 10
    needs: [changes, test]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.go == 'true')

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: command -v make &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends make)

    - name: Read Go version from mise.toml
      id: go-version
      run: |
        GO_VER=$(grep '^go = ' mise.toml | sed 's/go = "\(.*\)"/\1/')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    # Source-aware Go build cache (build prefix, shared with cross-platform per-arch).
    - name: Restore Go build cache
      id: gocache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-build-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-${{ hashFiles('**/*.go', 'go.mod', 'go.sum', 'Makefile', '**/testdata/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-build-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-build-

    - name: Log Go build cache restore
      run: |
        echo "cache-hit=${{ steps.gocache.outputs.cache-hit }}"
        echo "primary-key=${{ steps.gocache.outputs.cache-primary-key }}"
        echo "matched-key=${{ steps.gocache.outputs.cache-matched-key }}"

    - name: Install dependencies
      run: make deps

    - name: Build kurel
      run: make build-kurel

    - name: Save Go build cache
      if: success() && steps.gocache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/go-build
        key: ${{ steps.gocache.outputs.cache-primary-key }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: kurel-linux-amd64
        path: bin/kurel
        retention-days: 7

  docs-build:
    name: docs-build
    runs-on: autops-kube-kure
    timeout-minutes: 15
    needs: [changes]
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true')

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Check for downstream references
      # Scan the whole tree on every event (pull_request and merge_group alike) so a PR
      # can never be green while the merge queue would reject it. A diff-scoped PR check
      # let pre-existing violations (e.g. release-generated CHANGELOG lines) pass the PR
      # yet block admission at the queue.
      run: bash site/scripts/check-forbidden-terms.sh --full-tree

    - name: Read Hugo version from mise.toml
      id: hugo-version
      run: |
        HUGO_VER=$(grep '^hugo = ' mise.toml | sed 's/hugo = "\(.*\)"/\1/')
        if [ -z "$HUGO_VER" ]; then
          echo "::error::Failed to parse Hugo version from mise.toml"
          exit 1
        fi
        echo "version=$HUGO_VER" >> $GITHUB_OUTPUT

    - name: Restore Hugo from cache
      id: hugo-cache
      uses: actions/cache@v6
      with:
        path: ${{ runner.temp }}/hugo-bin
        key: hugo-${{ steps.hugo-version.outputs.version }}-linux-amd64

    - name: Install Hugo CLI
      if: steps.hugo-cache.outputs.cache-hit != 'true'
      run: |
        HUGO_VER="${{ steps.hugo-version.outputs.version }}"
        curl -fsSL -o ${{ runner.temp }}/hugo.deb \
          "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VER}/hugo_extended_${HUGO_VER}_linux-amd64.deb"
        sudo dpkg -i ${{ runner.temp }}/hugo.deb
        mkdir -p ${{ runner.temp }}/hugo-bin
        cp /usr/local/bin/hugo ${{ runner.temp }}/hugo-bin/hugo

    - name: Add cached Hugo to PATH
      if: steps.hugo-cache.outputs.cache-hit == 'true'
      run: sudo install ${{ runner.temp }}/hugo-bin/hugo /usr/local/bin/hugo

    - name: Read Go version from mise.toml
      id: go-version
      run: |
        GO_VER=$(grep '^go = ' mise.toml | sed 's/go = "\(.*\)"/\1/')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: false

    - name: Cache yq
      id: yq-cache
      uses: actions/cache@v6
      with:
        path: ~/bin/yq
        key: yq-4.44.6-linux-amd64

    - name: Install yq
      if: steps.yq-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        curl -fsSL -o ~/bin/yq \
          https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
        chmod +x ~/bin/yq
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Add yq to PATH
      if: steps.yq-cache.outputs.cache-hit == 'true'
      run: echo "$HOME/bin" >> $GITHUB_PATH

    - name: Validate docs map (code↔docs sync)
      run: bash site/scripts/check-doc-sync.sh

    - name: Inject front matter
      run: bash site/scripts/inject-frontmatter.sh

    - name: Generate versions config overlay
      run: bash scripts/gen-versions-toml.sh --version dev

    - name: Cache Hugo modules
      uses: actions/cache@v6
      with:
        path: |
          ${{ runner.temp }}/hugo_cache
          ~/go/pkg/mod
        key: ${{ runner.os }}-hugo-${{ hashFiles('site/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-hugo-

    - name: Build Hugo site
      working-directory: site
      env:
        HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        HUGO_ENVIRONMENT: production
      run: hugo --config hugo.toml,versions.toml --minify --baseURL "https://www.gokure.dev/launcher/"

    - name: Upload docs artifact
      uses: actions/upload-artifact@v7
      with:
        name: docs-site
        path: site/public/
        retention-days: 7

    - name: Cache lychee
      id: lychee-cache
      uses: actions/cache@v6
      with:
        path: ~/bin/lychee
        key: lychee-0.24.2-linux-amd64

    - name: Install lychee
      if: steps.lychee-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        curl -fsSL -o /tmp/lychee.tar.gz \
          https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.2/lychee-x86_64-unknown-linux-gnu.tar.gz
        tar xzf /tmp/lychee.tar.gz -C /tmp
        install -m755 /tmp/lychee-x86_64-unknown-linux-gnu/lychee ~/bin/lychee
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Add lychee to PATH
      if: steps.lychee-cache.outputs.cache-hit == 'true'
      run: echo "$HOME/bin" >> $GITHUB_PATH

    - name: Check internal links (rendered site)
      run: bash site/scripts/check-links.sh

  doc-gate:
    name: doc-gate
    runs-on: autops-kube-kure
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Cache yq
      id: yq-cache
      uses: actions/cache@v6
      with:
        path: ~/bin/yq
        key: yq-4.44.6-linux-amd64

    - name: Install yq
      if: steps.yq-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/bin
        curl -fsSL -o ~/bin/yq \
          https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64
        chmod +x ~/bin/yq
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Add yq to PATH
      if: steps.yq-cache.outputs.cache-hit == 'true'
      run: echo "$HOME/bin" >> $GITHUB_PATH

    - name: Enforce docs-with-code (Layer 3)
      run: |
        bash site/scripts/check-doc-gate.sh "origin/${{ github.base_ref }}" . \
          "--skip=${{ contains(github.event.pull_request.labels.*.name, 'docs-skip') }}"

  build:
    name: build
    runs-on: autops-kube-kure
    timeout-minutes: 1
    needs: [validate, test, build-binaries, docs-build, coverage-check, doc-gate]
    if: always()
    steps:
    - name: Check build results
      run: |
        vl="${{ needs.validate.result }}"
        tt="${{ needs.test.result }}"
        bb="${{ needs.build-binaries.result }}"
        db="${{ needs.docs-build.result }}"
        cc="${{ needs.coverage-check.result }}"
        dg="${{ needs.doc-gate.result }}"
        for result in "$vl" "$tt" "$bb" "$db" "$cc" "$dg"; do
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "Required job failed or was cancelled (result: $result)"
            exit 1
          fi
        done

  # =============================================================================
  # Stage 5: Cross-Platform Build (main/release only)
  # =============================================================================

  cross-platform:
    name: Cross-Platform Build
    runs-on: autops-kube-kure
    timeout-minutes: 15
    needs: build-binaries
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))

    strategy:
      fail-fast: false
      matrix:
        os: [linux]
        arch: [amd64, arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install build tools
      run: command -v make &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends make)

    - name: Read Go version from mise.toml
      id: go-version
      run: |
        GO_VER=$(grep '^go = ' mise.toml | sed 's/go = "\(.*\)"/\1/')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VER"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        cache: false

    - name: Cache Go modules
      uses: actions/cache@v6
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-gomod-

    # Source-aware Go build cache, scoped per target arch (cross-compiled arm64 artifacts
    # differ from amd64, so matrix.arch is part of the key — runner.arch is the host arch
    # and is identical across legs).
    - name: Restore Go build cache
      id: gocache
      uses: actions/cache/restore@v6
      with:
        path: ~/.cache/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-build-${{ matrix.os }}-${{ matrix.arch }}-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-${{ hashFiles('**/*.go', 'go.mod', 'go.sum', 'Makefile', '**/testdata/**') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-build-${{ matrix.os }}-${{ matrix.arch }}-deps-${{ hashFiles('go.mod', 'go.sum') }}-src-
          ${{ runner.os }}-${{ runner.arch }}-go-${{ steps.go-version.outputs.version }}-gocache-build-${{ matrix.os }}-${{ matrix.arch }}-

    - name: Log Go build cache restore
      run: |
        echo "cache-hit=${{ steps.gocache.outputs.cache-hit }}"
        echo "primary-key=${{ steps.gocache.outputs.cache-primary-key }}"
        echo "matched-key=${{ steps.gocache.outputs.cache-matched-key }}"

    - name: Install dependencies
      run: make deps

    - name: Build for ${{ matrix.os }}/${{ matrix.arch }}
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
      run: |
        VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
        GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
        BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')

        if [ "${{ matrix.os }}" = "windows" ]; then
          EXT=".exe"
        else
          EXT=""
        fi

        mkdir -p bin
        go build -ldflags="-s -w -X main.Version=${VERSION} -X main.GitCommit=${GIT_COMMIT} -X main.BuildTime=${BUILD_TIME}" \
          -o bin/kurel-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/kurel

    - name: Save Go build cache
      if: success() && steps.gocache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v6
      with:
        path: ~/.cache/go-build
        key: ${{ steps.gocache.outputs.cache-primary-key }}

    - name: Upload cross-platform artifacts
      uses: actions/upload-artifact@v7
      with:
        name: binaries-${{ matrix.os }}-${{ matrix.arch }}
        path: bin/*
        retention-days: 30

  # =============================================================================
  # PR-only Jobs (parallel, non-blocking)
  # =============================================================================

  analyze-changes:
    name: Analyze Changes
    runs-on: autops-kube-kure
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v47
      with:
        files: |
          **.go
          go.mod
          go.sum
          Makefile
          .github/workflows/**.yml

    - name: Analyze Go changes
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        echo "Changed Go-related files:"
        echo "${{ steps.changed-files.outputs.all_changed_files }}"

        # Count lines of code changes
        ADDED_LINES=$(git diff --numstat origin/main...HEAD | awk '{added+=$1} END {print added+0}')
        REMOVED_LINES=$(git diff --numstat origin/main...HEAD | awk '{removed+=$2} END {print removed+0}')

        echo "Lines added: $ADDED_LINES"
        echo "Lines removed: $REMOVED_LINES"

        # Check if this is a major change
        if [ "$ADDED_LINES" -gt 500 ] || [ "$REMOVED_LINES" -gt 500 ]; then
          echo "::notice::This is a major change (500+ lines). Consider breaking it into smaller PRs."
        fi

    - name: Check for breaking changes
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        # Look for potential breaking changes in public APIs
        if echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -E "pkg/.*\.go$"; then
          echo "::warning::Changes detected in pkg/ directory. Review for potential breaking changes to public API."
        fi
