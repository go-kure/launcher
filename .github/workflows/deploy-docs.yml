name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'DEVELOPMENT.md'
      - 'scripts/gen-versions-toml.sh'
  workflow_dispatch:
    inputs:
      version_slot:
        description: 'Target subdirectory (e.g., dev, v0.1)'
        required: true
        type: string
      version_label:
        description: 'Version label for Hugo params (e.g., v0.1.0, dev)'
        required: true
        type: string
      set_latest:
        description: 'Also deploy to root / as the latest stable'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# One deploy per version slot at a time
concurrency:
  group: deploy-docs-${{ inputs.version_slot || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy
    runs-on: autops-kube
    timeout-minutes: 10

    steps:
    - name: Checkout launcher repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends make

    - name: Determine version parameters
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "slot=${{ inputs.version_slot }}" >> $GITHUB_OUTPUT
          echo "label=${{ inputs.version_label }}" >> $GITHUB_OUTPUT
          echo "set_latest=${{ inputs.set_latest }}" >> $GITHUB_OUTPUT
        else
          # Push to main → dev build
          echo "slot=dev" >> $GITHUB_OUTPUT
          echo "label=dev" >> $GITHUB_OUTPUT
          echo "set_latest=false" >> $GITHUB_OUTPUT
        fi

    - name: Read Hugo version from mise.toml
      id: hugo-version
      run: |
        HUGO_VER=$(grep '^hugo = ' mise.toml | sed 's/hugo = "\(.*\)"/\1/')
        echo "version=$HUGO_VER" >> $GITHUB_OUTPUT

    - name: Install Hugo CLI
      run: |
        curl -fsSL -o ${{ runner.temp }}/hugo.deb \
          https://github.com/gohugoio/hugo/releases/download/v${{ steps.hugo-version.outputs.version }}/hugo_extended_${{ steps.hugo-version.outputs.version }}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

    - name: Read Go version from mise.toml
      id: go-version
      run: |
        GO_VER=$(grep '^go = ' mise.toml | sed 's/go = "\(.*\)"/\1/')
        echo "version=$GO_VER" >> $GITHUB_OUTPUT

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.go-version.outputs.version }}
        check-latest: true

    - name: Check mounted files exist
      run: bash site/scripts/check-mounts.sh

    - name: Inject front matter
      run: bash site/scripts/inject-frontmatter.sh

    # TODO: add CLI reference generation once kurel cobra commands are extracted

    - name: Generate versions config overlay
      run: bash scripts/gen-versions-toml.sh --version "${{ steps.version.outputs.label }}"

    - name: Build Hugo site (versioned slot)
      working-directory: site
      env:
        HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        HUGO_ENVIRONMENT: production
      run: |
        SLOT="${{ steps.version.outputs.slot }}"
        hugo --config hugo.toml,versions.toml --minify --baseURL "https://www.gokure.dev/launcher/${SLOT}/"
        # Save for deploy
        mv public public-slot

    - name: Build Hugo site (launcher/ root — latest)
      if: steps.version.outputs.set_latest == 'true'
      working-directory: site
      env:
        HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        HUGO_ENVIRONMENT: production
      run: |
        hugo --config hugo.toml,versions.toml --minify --baseURL "https://www.gokure.dev/launcher/"
        mv public public-root

    - name: Checkout go-kure.github.io
      uses: actions/checkout@v6
      with:
        repository: go-kure/go-kure.github.io
        token: ${{ secrets.DEPLOY_TOKEN }}
        path: deploy-target

    - name: Deploy to go-kure.github.io
      run: |
        cd deploy-target
        SLOT="${{ steps.version.outputs.slot }}"
        SET_LATEST="${{ steps.version.outputs.set_latest }}"

        # Ensure deployment infrastructure files exist
        echo "www.gokure.dev" > CNAME
        touch .nojekyll

        # --- Deploy versioned slot to launcher/{slot}/ ---
        echo "Deploying to /launcher/${SLOT}/..."
        mkdir -p launcher
        rm -rf "launcher/${SLOT}"
        cp -r ../site/public-slot "launcher/${SLOT}"

        # --- Deploy to launcher/ root (latest stable) ---
        if [[ "$SET_LATEST" == "true" ]]; then
          echo "Deploying to /launcher/ (latest stable)..."
          # Remove launcher/ root content but preserve version subdirectories
          find launcher -maxdepth 1 -mindepth 1 \
            -not -name 'dev' \
            -not -name 'v*' \
            -exec rm -rf {} +
          cp -r ../site/public-root/* launcher/
        fi

        # Get launcher commit info for the deploy message
        LAUNCHER_SHA=$(cd .. && git rev-parse --short HEAD)

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --staged --quiet; then
          echo "No changes to deploy"
        else
          LABEL="${{ steps.version.outputs.label }}"
          if [[ "$SET_LATEST" == "true" ]]; then
            MSG="deploy: ${LABEL} → /launcher/${SLOT}/ + /launcher/ (latest) from launcher@${LAUNCHER_SHA}"
          else
            MSG="deploy: ${LABEL} → /launcher/${SLOT}/ from launcher@${LAUNCHER_SHA}"
          fi
          git commit -m "$MSG"
          git push
        fi
