name: Release / Bump

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Version scope to bump (minor/major start a new cycle; prerelease increments the prerelease number)'
        required: true
        type: choice
        options:
          - minor
          - major
          - prerelease
      dry_run:
        description: 'Dry run (preview only, no changes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

jobs:
  release-bump:
    uses: go-kure/.github/.github/workflows/release-bump.yml@main
    with:
      scope: ${{ inputs.scope }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
