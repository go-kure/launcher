name: Create Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - alpha
          - beta
          - rc
          - stable
          - bump
      scope:
        description: 'Bump scope (only used when type=bump)'
        required: false
        type: choice
        default: minor
        options:
          - minor
          - major
      dry_run:
        description: 'Dry run (preview only, no changes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release-create:
    uses: go-kure/.github/.github/workflows/release-create.yml@main
    with:
      type: ${{ inputs.type }}
      scope: ${{ inputs.scope }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
