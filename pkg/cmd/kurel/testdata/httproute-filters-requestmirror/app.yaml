apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: production
spec:
  components:
  - name: api
    type: webservice
    properties:
      image: myregistry/api:v1.0.0
      port: 8080
    traits:
    - type: httproute
      properties:
        parentRefs:
          - name: public-gateway
            namespace: gateway-system
        hostnames:
          - api.example.com
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            filters:
              - type: RequestMirror
                requestMirror:
                  backendRef:
                    name: mirror-svc
                    port: 8080
                  percent: 50
