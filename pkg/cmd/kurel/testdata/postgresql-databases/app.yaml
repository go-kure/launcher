apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: test-db
  namespace: default
spec:
  components:
  - name: postgres
    type: postgresql
    properties:
      version: "16"
      storageSize: "10Gi"
      databases:
      - name: myapp
        owner: myapp_user
      - name: analytics
        owner: analytics_user
        databaseReclaimPolicy: delete
        extensions:
        - name: pg_stat_statements
        - name: pgvector
          ensure: absent
