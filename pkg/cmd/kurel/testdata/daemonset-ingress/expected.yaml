apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: agent
  name: agent
  namespace: default
spec:
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
      - image: ghcr.io/example/agent:v1.0
        imagePullPolicy: IfNotPresent
        name: agent
        ports:
        - containerPort: 9090
          name: tcp
          protocol: TCP
        resources:
          limits:
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
      serviceAccountName: agent
  updateStrategy: {}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: agent
  name: agent
  namespace: default
spec:
  ports:
  - name: tcp
    port: 9090
    protocol: TCP
    targetPort: 9090
  selector:
    app: agent
  type: ClusterIP
---
apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  labels:
    app: agent
  name: agent
  namespace: default
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app: agent
  name: agent-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: agent.example.com
    http:
      paths:
      - backend:
          service:
            name: agent
            port:
              number: 9090
        path: /metrics
        pathType: Prefix
