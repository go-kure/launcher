apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: test-db
  namespace: default
spec:
  components:
  - name: postgres
    type: postgresql
    properties:
      version: "16"
      storageSize: "10Gi"
      objectStore:
        destinationPath: s3://my-bucket/postgres/
        endpointURL: https://s3.example.com
        secretName: postgres-backup-creds
        retentionPolicy: 30d
