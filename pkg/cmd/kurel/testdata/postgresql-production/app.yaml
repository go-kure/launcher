apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: test-db-prod
  namespace: production
spec:
  components:
  - name: main-db
    type: postgresql
    properties:
      version: "16"
      storageSize: "100Gi"
      replicas: 3
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "4"
          memory: 8Gi
      monitoring:
        enabled: true
      replication:
        synchronous:
          method: "any"
          number: 1
          dataDurability: "required"
      postgresql:
        parameters:
          shared_buffers: "256MB"
          effective_cache_size: "768MB"
          max_connections: "200"
      affinity:
        enablePodAntiAffinity: true
        topologyKey: "kubernetes.io/hostname"
        podAntiAffinityType: "required"
        nodeSelector:
          workload-type: "database"
