apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: default
spec:
  components:
    - name: metrics
      type: helmchart
      properties:
        chart: kube-prometheus-stack
        version: "69.3.2"
        source:
          url: https://prometheus-community.github.io/helm-charts
        targetNamespace: monitoring
