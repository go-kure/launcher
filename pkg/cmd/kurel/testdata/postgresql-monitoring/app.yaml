apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: test-db
  namespace: default
spec:
  components:
  - name: postgres
    type: postgresql
    properties:
      version: "16"
      storageSize: "10Gi"
      monitoring:
        enabled: true
        customQueries:
        - name: pg-stat-statements
          key: queries
        - name: pg-custom-metrics
          key: custom-queries
