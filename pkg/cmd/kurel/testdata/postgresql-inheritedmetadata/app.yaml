apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: test-db
  namespace: default
spec:
  components:
  - name: postgres
    type: postgresql
    properties:
      version: "16"
      storageSize: "10Gi"
      inheritedMetadata:
        labels:
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: app-ns
        annotations:
          backup.velero.io/backup-volumes: data
