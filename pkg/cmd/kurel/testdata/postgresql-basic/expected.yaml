apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: default
spec:
  affinity: {}
  enablePDB: false
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  instances: 1
  postgresql:
    syncReplicaElectionConstraint:
      enabled: false
  primaryUpdateStrategy: unsupervised
  resources: {}
  storage:
    size: 10Gi
