apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: hello
  namespace: default
spec:
  components:
  - name: web
    type: webservice
    properties:
      image: nginx:1.25
    traits:
    - type: httproute
      properties:
        parentRefs:
          - name: my-gateway
        hostnames:
          - example.com
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            backendRefs:
              - port: 80
          - matches:
              - path:
                  type: PathPrefix
                  value: /web
            backendRefs:
              - port: 80
