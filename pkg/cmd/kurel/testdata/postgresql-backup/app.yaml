apiVersion: launcher.gokure.dev/v1alpha1
kind: Application
metadata:
  name: test-db
  namespace: default
spec:
  components:
  - name: postgres
    type: postgresql
    properties:
      version: "16"
      storageSize: "10Gi"
      backup:
        retentionPolicy: "30d"
        destinationPath: "s3://my-bucket/backups"
        endpointURL: "https://s3.amazonaws.com"
        secretName: "backup-creds"
