apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: cleanup
  name: cleanup
  namespace: default
spec:
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app: cleanup
    spec:
      template:
        metadata:
          labels:
            app: cleanup
        spec:
          containers:
          - image: ghcr.io/example/cleanup:v1.0.0
            imagePullPolicy: IfNotPresent
            name: cleanup
            resources:
              limits:
                memory: 128Mi
              requests:
                cpu: 100m
                memory: 128Mi
          restartPolicy: OnFailure
          serviceAccountName: cleanup
  schedule: 0 2 * * *
  successfulJobsHistoryLimit: 3
---
apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  labels:
    app: cleanup
  name: cleanup
  namespace: default
