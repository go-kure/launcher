apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: agent
  name: agent
  namespace: default
spec:
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
      - image: ghcr.io/example/agent:v1.0.0
        imagePullPolicy: IfNotPresent
        name: agent
        resources:
          limits:
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
      serviceAccountName: agent
  updateStrategy: {}
---
apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  labels:
    app: agent
  name: agent
  namespace: default
